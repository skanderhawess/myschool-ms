# =============================================
# Configuration centralisee du notification-service
# =============================================

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/myschool_notifications
spring.data.mongodb.database=myschool_notifications

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# Mail (configurable via variables d'environnement)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator
management.health.mail.enabled=false

# Feign — timeouts et logging
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=5000
logging.level.com.myschool.notificationservice.client=DEBUG
