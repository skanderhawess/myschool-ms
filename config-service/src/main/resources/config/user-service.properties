# =============================================
# Configuration centralisee du user-service
# (spring.application.name et server.port restent en local)
# =============================================

spring.profiles.active=local

spring.datasource.url=jdbc:mysql://localhost:3306/myschool_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

app.jwt.secret=${APP_JWT_SECRET:mYSch00l_S3cr3t_K3y_Tr3s_L0ngu3_P0ur_HS256_2024!}
app.jwt.expirationMinutes=60

logging.level.org.springframework.security=INFO
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator
management.health.mail.enabled=false

server.error.include-message=always
server.error.include-binding-errors=always

# Mail config
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Admin alert config
app.admin.email=${ADMIN_EMAIL:shawess618@gmail.com}

# Fix existing courses with NULL/0 max_capacity on startup
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-local.sql
