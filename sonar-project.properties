# =============================================================================
# sonar-project.properties - Configuration SonarQube Backend MySchool
# =============================================================================
# Fichier lu par le scanner SonarQube pour analyser le code Java multi-modules
# Utilise avec la commande : mvn sonar:sonar (ou sonar-scanner)
# =============================================================================

# --- Identification du projet sur le serveur SonarQube -----------------------
# La cle doit correspondre EXACTEMENT au projet cree sur http://localhost:9000
sonar.projectKey=myschool-ms
sonar.projectName=MySchool Backend
sonar.projectVersion=1.0

# --- URL du serveur SonarQube (local) ----------------------------------------
sonar.host.url=http://localhost:9000

# --- Encodage des sources ----------------------------------------------------
sonar.sourceEncoding=UTF-8

# --- Version Java utilisee ---------------------------------------------------
sonar.java.source=17
sonar.java.target=17

# --- Sources et tests pour un projet Maven multi-modules ---------------------
# On indique a Sonar que chaque module possede son dossier src/main/java et
# src/test/java (convention Maven standard)
sonar.sources=src/main/java
sonar.tests=src/test/java

# --- Repertoire des classes compilees (requis pour l'analyse Java) ----------
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# --- Rapports de couverture JaCoCo par module --------------------------------
# On agrege les rapports XML de chaque microservice
sonar.coverage.jacoco.xmlReportPaths=\
  discovery-service/target/site/jacoco/jacoco.xml,\
  gateway-service/target/site/jacoco/jacoco.xml,\
  user-service/target/site/jacoco/jacoco.xml,\
  notification-service/target/site/jacoco/jacoco.xml,\
  config-service/target/site/jacoco/jacoco.xml

# --- Rapports de tests JUnit -------------------------------------------------
sonar.junit.reportPaths=target/surefire-reports

# --- Exclusions : fichiers non pertinents pour l'analyse qualite -------------
# Les DTOs/Entities sont majoritairement des POJOs, config = boilerplate Spring
sonar.exclusions=\
  **/dto/**,\
  **/entity/**,\
  **/*Application.java,\
  **/config/**,\
  **/generated/**

# --- Exclusions de couverture (meme logique : pas besoin de coverage dessus) -
sonar.coverage.exclusions=\
  **/dto/**,\
  **/entity/**,\
  **/*Application.java,\
  **/config/**
